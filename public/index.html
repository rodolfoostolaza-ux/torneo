<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONVERGENCIA: El Torneo Final</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --marvel: #c0392b;
  --dc: #2980b9;
  --gold: #f39c12;
  --text: #e0e0e0;
  --dim: #666666;
  --border: #222222;
  --nav-h: 44px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 1.08rem;
  min-height: 100vh;
  overflow-x: hidden;
}
.screen { display: none; }
.screen.active { display: block; }

/* ── GLOBAL NAV ── */
#global-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(5,5,5,0.96);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid #2a2a2a;
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 0 0.75rem;
  gap: 0.5rem;
}
#global-nav.visible { display: flex; }
#nav-status {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-align: center;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 0.5rem;
}
.nav-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.3rem 0.7rem;
  border: 1px solid;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.nav-btn-red   { color: #e74c3c; border-color: #e74c3c; }
.nav-btn-red:hover   { background: #e74c3c; color: #fff; }
.nav-btn-gold  { color: var(--gold); border-color: var(--gold); }
.nav-btn-gold:hover  { background: var(--gold); color: #000; }

/* ── BRACKET MODAL ── */
#bracket-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.88);
  z-index: 300;
  overflow-y: auto;
  padding: 1rem;
}
#bracket-modal.open { display: block; }
.modal-box {
  background: #0d0d0d;
  border: 1px solid #333;
  margin: 50px auto 2rem;
  max-width: 960px;
  padding: 1.5rem;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 0.75rem; right: 0.75rem;
  background: none;
  border: 1px solid #444;
  color: #aaa;
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0.2rem 0.55rem;
  line-height: 1.4;
}
.modal-close:hover { color: #fff; border-color: #fff; }
.modal-title {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: 1.1rem;
  letter-spacing: 0.18em;
  margin-bottom: 1.2rem;
  padding-right: 2.5rem;
}

/* ── WELCOME ── */
#screen-welcome {
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #1a0505 0%, #0a0a0a 65%);
}
#screen-welcome.active {
  display: flex;
  align-items: center;
  justify-content: center;
}
.welcome-content { text-align: center; padding: 2rem; }
.welcome-content h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(2.5rem, 9vw, 6rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--marvel) 0%, var(--gold) 50%, var(--dc) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.08em;
  line-height: 1.1;
}
.welcome-content h2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.9rem, 2.5vw, 1.6rem);
  color: var(--gold);
  margin: 0.75rem 0 0.5rem;
  letter-spacing: 0.25em;
  font-weight: 400;
}
.welcome-content .sub {
  font-size: 1.05rem;
  color: var(--dim);
  margin-bottom: 2.5rem;
  letter-spacing: 0.12em;
}
#loading-msg {
  margin-top: 1.5rem;
  min-height: 60px;
  color: var(--gold);
  font-style: italic;
}
.progress-wrap {
  width: min(320px, 80vw);
  height: 4px;
  background: #222;
  border-radius: 2px;
  margin: 0.5rem auto;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.25s;
}
.progress-label { font-size: 0.78rem; color: var(--dim); margin-top: 0.4rem; }

/* ── BUTTONS ── */
.btn {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.7rem 1.8rem;
  border: 2px solid currentColor;
  background: transparent;
  cursor: pointer;
  transition: background 0.18s, color 0.18s;
}
.btn-gold  { color: var(--gold); border-color: var(--gold); }
.btn-gold:hover:not(:disabled)  { background: var(--gold); color: #000; }
.btn-marvel { color: var(--marvel); border-color: var(--marvel); }
.btn-marvel:hover:not(:disabled) { background: var(--marvel); color: #fff; }
.btn-dc  { color: var(--dc); border-color: var(--dc); }
.btn-dc:hover:not(:disabled)   { background: var(--dc); color: #fff; }
.btn:disabled { opacity: 0.28; cursor: not-allowed; }

/* ── SELECTION ── */
#screen-selection { min-height: 100vh; padding-top: var(--nav-h); }
.sel-header {
  position: sticky;
  top: var(--nav-h);
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(6px);
  z-index: 100;
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.sel-header h2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  color: var(--gold);
  margin-bottom: 0.4rem;
}
#counter { font-family: 'Cinzel', serif; font-size: 1rem; margin-bottom: 0.5rem; }
#counter .cnt-marvel { color: var(--marvel); }
#counter .cnt-dc { color: var(--dc); }
.sel-btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.9rem;
  padding: 1rem;
  max-width: 1400px;
  margin: 0 auto;
}
.char-card {
  background: var(--bg2);
  border: 2px solid var(--border);
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.18s;
}
.char-card:hover:not(.unavailable) { transform: scale(1.05); }
.char-card.selected { border-color: var(--gold); filter: brightness(1.3); }
.char-card.unavailable { filter: grayscale(1); cursor: not-allowed; }
.char-card.is-marvel { border-left: 3px solid var(--marvel); }
.char-card.is-dc     { border-left: 3px solid var(--dc); }
.char-img {
  width: 100%;
  height: 175px;
  object-fit: cover;
  object-position: top center;
  display: block;
  background: #1a1a1a;
}
/* img-fallback: replaces broken <img> tags */
.img-fallback {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.3rem;
  background: #111;
  text-align: center;
}
.char-info { padding: 0.45rem 0.5rem 0.55rem; }
.char-name {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 1px;
}
.char-pub { font-size: 0.6rem; margin-bottom: 0.25rem; font-weight: 600; letter-spacing: 0.05em; }
.sbar-row { display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
.sbar-lbl { font-size: 0.55rem; color: var(--dim); width: 20px; flex-shrink: 0; }
.sbar { flex: 1; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
.sbar-fill { height: 100%; border-radius: 2px; }

/* ── BRACKET ── */
#screen-bracket { min-height: 100vh; padding: calc(1.5rem + var(--nav-h)) 1rem 3rem; }
#screen-bracket h2 {
  font-family: 'Cinzel', serif;
  text-align: center;
  color: var(--gold);
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  margin-bottom: 1.5rem;
  letter-spacing: 0.2em;
}
.bracket-wrap {
  display: flex;
  gap: 1.5rem;
  justify-content: flex-start;
  overflow-x: auto;
  padding: 0.5rem 0 1.5rem;
}
.b-round { display: flex; flex-direction: column; min-width: 170px; }
.b-round-label {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: 0.72rem;
  text-align: center;
  letter-spacing: 0.1em;
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}
.b-matches-col { display: flex; flex-direction: column; gap: 0.6rem; flex: 1; justify-content: space-around; }
.b-match { background: var(--bg2); border: 1px solid var(--border); overflow: hidden; }
.b-fighter {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.5rem;
  border-bottom: 1px solid var(--border);
}
.b-fighter:last-child { border-bottom: none; }
.b-fighter img, .b-fighter .bf-ph {
  width: 26px;
  height: 26px;
  object-fit: cover;
  object-position: top;
  border-radius: 2px;
  flex-shrink: 0;
  background: #1a1a1a;
}
.b-fighter .bf-ph {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  color: #555;
}
.b-fighter-name {
  font-size: 0.65rem;
  font-family: 'Cinzel', serif;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.b-fighter.winner { background: rgba(243,156,18,0.12); }
.b-fighter.winner .b-fighter-name { color: var(--gold); font-weight: 700; }
.b-fighter.loser .b-fighter-name  { color: var(--dim); text-decoration: line-through; }
.b-fighter.tbd .b-fighter-name    { color: #333; font-style: italic; }
.bracket-actions { text-align: center; margin-top: 1.5rem; }

/* ── COMBAT ── */
#screen-combat { min-height: 100vh; padding-top: var(--nav-h); }
.comb-pres {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
  max-width: 920px;
  margin: 0 auto;
}
.comb-header {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: 0.88rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}
.fighters-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 1.5rem;
  width: 100%;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.f-panel { flex: 1; max-width: 280px; text-align: center; min-width: 180px; }
.f-panel img, .f-panel .fp-ph {
  width: 100%;
  max-width: 220px;
  height: 270px;
  object-fit: cover;
  object-position: top center;
  display: block;
  margin: 0 auto;
  background: #1a1a1a;
}
.f-panel .fp-ph {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.f-panel.f-marvel img, .f-panel.f-marvel .fp-ph { border-bottom: 3px solid var(--marvel); }
.f-panel.f-dc    img, .f-panel.f-dc    .fp-ph { border-bottom: 3px solid var(--dc); }
.f-name {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  font-weight: 700;
  margin: 0.5rem 0 0.2rem;
  text-transform: uppercase;
}
.f-uni { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
.f-dmg {
  background: rgba(192,57,43,0.15);
  border: 1px solid #7a1a1a;
  padding: 0.28rem 0.5rem;
  font-size: 0.7rem;
  color: #e74c3c;
  font-style: italic;
  margin-bottom: 0.5rem;
}
.vs-sep {
  font-family: 'Cinzel', serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--gold);
  flex-shrink: 0;
  padding-top: 80px;
}
.comb-btn { text-align: center; margin-top: 1.5rem; }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  margin-top: 0.5rem;
  text-align: left;
}
.bstat-row { display: flex; align-items: center; gap: 5px; }
.bstat-lbl { font-size: 0.58rem; color: var(--dim); width: 24px; flex-shrink: 0; text-transform: uppercase; }
.bstat-bar { flex: 1; height: 7px; background: #222; border-radius: 3px; overflow: hidden; }
.bstat-fill { height: 100%; border-radius: 3px; }
.bstat-val { font-size: 0.58rem; color: var(--text); width: 22px; text-align: right; flex-shrink: 0; }

/* ── NARRATION ── */
.narr-screen { min-height: 100vh; position: relative; padding: 2.5rem 1rem 3rem; max-width: 820px; margin: 0 auto; }
.narr-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  z-index: 0;
  pointer-events: none;
}
.narr-bg-half {
  flex: 1;
  background-size: cover;
  background-position: top center;
  opacity: 0.07;
}
.narr-inner { position: relative; z-index: 1; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.narr-loading {
  text-align: center;
  padding: 5rem 2rem;
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: 1.2rem;
}
.narr-loading p { animation: pulse 1.6s ease-in-out infinite; }
.narr-title {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: clamp(1.1rem, 3vw, 1.6rem);
  text-align: center;
  margin-bottom: 1.5rem;
  letter-spacing: 0.15em;
}
.narr-text { font-size: 1.05rem; line-height: 1.85; color: #c8c8c8; font-style: italic; margin-bottom: 2rem; }
.narr-text p { margin-bottom: 1rem; }

/* ── RESULT ── */
.result-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 3rem;
  max-width: 900px;
  margin: 0 auto;
}
.result-title {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  letter-spacing: 0.25em;
  margin-bottom: 1.5rem;
}
.result-duo {
  display: flex;
  gap: 2.5rem;
  align-items: flex-start;
  justify-content: center;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.r-winner-panel { text-align: center; }
.r-winner-panel img, .r-winner-panel .rw-ph {
  width: 200px; height: 255px;
  object-fit: cover; object-position: top;
  background: #1a1a1a;
  filter: drop-shadow(0 0 18px var(--gold)) drop-shadow(0 0 36px rgba(243,156,18,0.4));
  display: block; margin: 0 auto;
}
.r-winner-panel .rw-ph {
  filter: none;
  box-shadow: 0 0 18px var(--gold), 0 0 36px rgba(243,156,18,0.4);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.r-loser-panel { text-align: center; }
.r-loser-panel img, .r-loser-panel .rl-ph {
  width: 155px; height: 200px;
  object-fit: cover; object-position: top;
  background: #1a1a1a;
  filter: grayscale(1); opacity: 0.45;
  display: block; margin: 0 auto;
}
.r-loser-panel .rl-ph {
  filter: none; opacity: 0.45;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.r-winner-name { font-family:'Cinzel',serif; font-size:1.1rem; color:var(--gold); font-weight:700; margin-top:0.6rem; }
.r-loser-name  { font-family:'Cinzel',serif; font-size:0.85rem; color:var(--dim); text-decoration:line-through; margin-top:0.4rem; }
.death-box {
  background: rgba(192,57,43,0.1);
  border-left: 3px solid var(--marvel);
  padding: 0.8rem 1.2rem;
  font-style: italic;
  color: #e05050;
  margin: 1rem 0;
  max-width: 600px;
  width: 100%;
  font-size: 0.95rem;
  line-height: 1.6;
}
.damage-box {
  background: rgba(39,174,96,0.05);
  border: 1px solid #1a3a2a;
  padding: 0.8rem 1rem;
  margin: 0.5rem 0 1rem;
  max-width: 500px;
  width: 100%;
}
.damage-box h4 { font-family:'Cinzel',serif; color:#27ae60; font-size:0.78rem; letter-spacing:0.1em; margin-bottom:0.4rem; }
.damage-box p  { font-size:0.82rem; font-style:italic; color:#7dcea0; line-height:1.5; }

/* ── FINAL SCREEN ── */
#screen-final { min-height: 100vh; padding: calc(2rem + var(--nav-h)) 1rem 3rem; }
.final-wrap { max-width: 900px; margin: 0 auto; text-align: center; }
.final-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.3rem, 3.5vw, 2.4rem);
  color: var(--gold);
  letter-spacing: 0.2em;
  margin-bottom: 1rem;
}
.uatu-card {
  background: radial-gradient(ellipse at center, #1f1500 0%, #0a0a0a 80%);
  border: 2px solid var(--gold);
  padding: 1.5rem 1rem;
  margin: 1.5rem auto;
  max-width: 320px;
}
.epilogue-box {
  background: rgba(243,156,18,0.04);
  border: 1px solid rgba(243,156,18,0.25);
  padding: 1.5rem 2rem;
  margin: 1.5rem 0;
  text-align: left;
}
.epilogue-box h3 { font-family:'Cinzel',serif; color:var(--gold); font-size:1rem; letter-spacing:0.15em; margin-bottom:0.8rem; }
.epilogue-box p  { font-size:1rem; line-height:1.8; color:#ccc; font-style:italic; margin-bottom:0.75rem; }
.epilogue-box p:last-child { margin-bottom:0; }

/* ── UTILITY ── */
.tc { text-align: center; }
.mt1 { margin-top: 0.5rem; }
.mt2 { margin-top: 1rem; }
@media (max-width: 580px) {
  .fighters-row { flex-direction: column; align-items: center; }
  .vs-sep { padding-top: 0; }
  .f-panel { max-width: 100%; }
  .result-duo { gap: 1.5rem; }
}
</style>
</head>
<body>

<!-- ════ GLOBAL NAV (all screens except welcome) ════ -->
<div id="global-nav">
  <button class="nav-btn nav-btn-red" onclick="confirmRestart()">← Inicio</button>
  <div id="nav-status">CONVERGENCIA</div>
  <button class="nav-btn nav-btn-gold" onclick="showBracketModal()" id="nav-bracket-btn" style="display:none">Ver Bracket</button>
  <button class="nav-btn nav-btn-gold" onclick="AudioManager.toggle()" id="btn-mute" style="display:none;min-width:2.2rem">🔊</button>
</div>

<!-- ════ BRACKET MODAL ════ -->
<div id="bracket-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeBracketModal()">✕</button>
    <div class="modal-title">⚡ ESTADO DEL BRACKET</div>
    <div id="bracket-modal-content" class="bracket-wrap"></div>
  </div>
</div>

<!-- ════ SCREEN 1: WELCOME ════ -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-content">
    <h1>CONVERGENCIA</h1>
    <h2>El Torneo Final</h2>
    <p class="sub">Marvel vs DC — Solo uno sobrevive</p>
    <button class="btn btn-gold" id="btn-start" onclick="startApp()">Comenzar</button>
    <div id="loading-msg"></div>
  </div>
</div>

<!-- ════ SCREEN 2: SELECTION ════ -->
<div id="screen-selection" class="screen">
  <div class="sel-header">
    <h2>Selecciona tus Luchadores</h2>
    <div id="counter">
      <span class="cnt-marvel">Marvel: 0/8</span>&nbsp;|&nbsp;<span class="cnt-dc">DC: 0/8</span>
    </div>
    <div class="sel-btns">
      <button class="btn btn-gold" onclick="randomSelection()">Selección Aleatoria</button>
      <button class="btn btn-gold" id="btn-create" onclick="createTournament()" disabled>Crear Torneo</button>
    </div>
  </div>
  <div id="char-grid" class="char-grid"></div>
</div>

<!-- ════ SCREEN 3: BRACKET ════ -->
<div id="screen-bracket" class="screen">
  <h2>BRACKET DEL TORNEO</h2>
  <div id="bracket-display" class="bracket-wrap"></div>
  <div class="bracket-actions" id="bracket-actions">
    <button class="btn btn-gold" onclick="startCombats()">⚔ Iniciar Combates</button>
    <button class="btn" style="margin-left:1rem;border-color:var(--silver);color:var(--silver)"
            onclick="quickResolve()">⚡ Resolver Rápido</button>

const AudioManager = {
  ambient: null,
  battle:  null,
  current: null,
  muted:   false,
  FADE:    1500,

  init() {
    this.ambient = new Audio('audio/ambient.mp3');
    this.ambient.loop = true;
    this.ambient.volume = 0;

    this.battle = new Audio('audio/battle.mp3');
    this.battle.loop = true;
    this.battle.volume = 0;
  },

  _fadeIn(audio, duration) {
    audio.play().catch(() => {});
    const steps = 30;
    const dt    = duration / steps;
    const dv    = 0.7 / steps;   // max volume 0.7
    let step = 0;
    const iv = setInterval(() => {
      step++;
      audio.volume = Math.min(0.7, audio.volume + dv);
      if (step >= steps) clearInterval(iv);
    }, dt);
  },

  _fadeOut(audio, duration, cb) {
    const steps = 30;
    const dt    = duration / steps;
    const dv    = audio.volume / steps;
    let step = 0;
    const iv = setInterval(() => {
      step++;
      audio.volume = Math.max(0, audio.volume - dv);
      if (step >= steps) {
        clearInterval(iv);
        audio.pause();
        audio.currentTime = 0;
        if (cb) cb();
      }
    }, dt);
  },

  play(track) {
    const audio = this[track];
    if (!audio || this.muted) return;
    this.current = audio;
    this._fadeIn(audio, this.FADE);
    document.getElementById('btn-mute').style.display = '';
  },

  crossfade(track) {
    const next = this[track];
    if (!next || this.muted) return;
    if (this.current && this.current !== next) {
      const prev = this.current;
      this._fadeOut(prev, this.FADE, () => {
        this.current = next;
        this._fadeIn(next, this.FADE);
      });
    } else {
      this.current = next;
      this._fadeIn(next, this.FADE);
    }
  },

  toggle() {
    this.muted = !this.muted;
    const btn = document.getElementById('btn-mute');
    if (this.muted) {
      if (this.current) this.current.pause();
      btn.textContent = '🔇';
    } else {
      if (this.current) { this.current.volume = 0; this._fadeIn(this.current, 800); }
      btn.textContent = '🔊';
    }
  }
};

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function isMarvel(c) { return (c.publisher || '').toLowerCase().includes('marvel'); }
function charColor(c) { return isMarvel(c) ? '#c0392b' : '#2980b9'; }
function statColor(v) { return v >= 75 ? '#27ae60' : v >= 45 ? '#f39c12' : '#c0392b'; }

function defaultStats() {
  return { intelligence:70, strength:70, speed:70, durability:70, power:70, combat:70 };
}

function degradeStats(char) {
  const s = { ...char.stats };
  const keys = ['intelligence','strength','speed','durability','power','combat'];
  const n = Math.floor(Math.random() * 3) + 2;
  shuffle(keys).slice(0, n).forEach(k => {
    s[k] = Math.max(10, s[k] - Math.floor(Math.random() * 11) - 5);
  });
  return s;
}

/* ── IMAGE HELPERS ──
   Browsers can load <img src="..."> from any domain without CORS.
   referrerpolicy="no-referrer" helps bypass hotlink protection.
   onerror replaces the img with a styled div showing the char name. */
function imgTag(url, cssClass, name, color, extraStyle) {
  const src = url || '';
  const es  = extraStyle ? ` style="${extraStyle}"` : '';
  return src
    ? `<img class="${cssClass}" src="${src}" alt="${name}" referrerpolicy="no-referrer"
           data-n="${name.replace(/"/g,"'")}" data-c="${color}"
           onerror="imgErr(this)"${es}>`
    : imgFallbackHTML(name, color, cssClass, extraStyle);
}

function imgFallbackHTML(name, color, cssClass, extraStyle) {
  const es = extraStyle ? ` style="${extraStyle}"` : '';
  return `<div class="img-fallback ${cssClass}"${es}>
    <div style="font-size:1.8rem;opacity:0.4">${color === '#c0392b' ? '⚡' : '🌟'}</div>
    <div style="color:${color};font-family:'Cinzel',serif;font-size:0.72rem;font-weight:700;
                text-align:center;padding:0.4rem 0.3rem;line-height:1.4;text-transform:uppercase">${name}</div>
  </div>`;
}

function imgErr(el) {
  const name  = el.dataset.n || el.alt || '?';
  const color = el.dataset.c || '#666';
  const div   = document.createElement('div');
  div.className = el.className + ' img-fallback';
  // Copy any inline style the img had
  if (el.style.cssText) div.style.cssText = el.style.cssText;
  div.innerHTML = `
    <div style="font-size:1.8rem;opacity:0.4">${color === '#c0392b' ? '⚡' : '🌟'}</div>
    <div style="color:${color};font-family:'Cinzel',serif;font-size:0.72rem;font-weight:700;
                text-align:center;padding:0.4rem 0.3rem;line-height:1.4;text-transform:uppercase">${name}</div>`;
  if (el.parentNode) el.parentNode.replaceChild(div, el);
}

/* fetchChar: ya no se usa en el flujo normal (loadAllChars usa hardcoded),
   pero se mantiene por si se quiere recuperar imagen de la API puntualmente */
async function fetchChar(name, pub) {
  const hardStats = HARDCODED_STATS[name];
  try {
    const apiUrl = `${SHAPI}/search/${encodeURIComponent(name)}`;
    const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`);
    const d = await r.json();
    if (d.response !== 'success' || !d.results || !d.results.length) {
      console.warn(`[SuperHero API] Sin resultados para ${name}, usando hardcoded`);
      return makeDefault(name, pub, hardStats);
    }
    const pubKey = pub.toLowerCase().includes('marvel') ? 'marvel' : 'dc';
    const c = d.results.find(x => x.name.toLowerCase() === name.toLowerCase())
           || d.results.find(x => (x.biography?.publisher || '').toLowerCase().includes(pubKey))
           || d.results[0];
    console.log('[SuperHero API] Imagen obtenida:', name, c.image?.url);
    return {
      id: c.id, name,
      publisher: c.biography?.publisher || pub,
      image: c.image?.url || null,
      stats: { ...(hardStats || defaultStats()) },
      damage: null
    };
  } catch(e) {
    console.warn(`[SuperHero API] Error cargando ${name}:`, e.message);
    return makeDefault(name, pub, hardStats);
  }
}

function makeDefault(name, pub, hardStats) {
  return { id: name.toLowerCase().replace(/\s+/g,'-'), name, publisher: pub, image: null,
           stats: hardStats || defaultStats(), damage: null };
}

/* fetchImagesBackground — busca URLs de imagen del SuperHero API de forma
   no bloqueante y actualiza el DOM card por card conforme llegan.          */
async function fetchCharImageUrl(name) {
  const apiUrl = `${SHAPI}/search/${encodeURIComponent(name)}`;
  const proxies = [
    { label: 'corsproxy.io',  url: `https://corsproxy.io/?${encodeURIComponent(apiUrl)}` },
    { label: 'allorigins',    url: `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}` }
  ];
  for (const { label, url } of proxies) {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!r.ok) {
        console.warn(`[Img:${name}] ${label} HTTP ${r.status}`);
        continue;
      }
      const text = await r.text();
      let d;
      try { d = JSON.parse(text); }
      catch { console.warn(`[Img:${name}] ${label} JSON inválido:`, text.slice(0,120)); continue; }

      if (d.response !== 'success' || !d.results?.length) {
        console.warn(`[Img:${name}] ${label} sin resultados — response:"${d.response}" error:"${d.error}"`);
        continue;
      }
      const c = d.results.find(x => x.name.toLowerCase() === name.toLowerCase()) || d.results[0];
      const imgUrl = c.image?.url || null;
      if (imgUrl) {
        console.log(`[Img:${name}] ✓ ${label} → ${imgUrl}`);
        return imgUrl;
      }
      console.warn(`[Img:${name}] ${label} resultado sin imagen`);
    } catch(e) {
      console.warn(`[Img:${name}] ${label} error: ${e.message}`);
    }
  }
  console.error(`[Img:${name}] Todos los proxies fallaron`);
  return null;
}

      img.src = url;
      img.alt = char.name;
      img.setAttribute('data-n', char.name.replace(/"/g, "'"));
      img.setAttribute('data-c', col);
      img.onerror = function() { imgErr(this); };
      old.parentNode.replaceChild(img, old);
    }
  }
}

/* ═══════════════════════════════════════════
   API — NARRATE (serverless proxy)
═══════════════════════════════════════════ */
async function callNarrate(payload) {
  const resp = await fetch('https://torneo-pearl.vercel.app/api/narrate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function parseCombat(text, n1, n2) {
  const ganadorM = text.match(/GANADOR:\s*([^\|\n]+)/i);
  const muerteM  = text.match(/MUERTE:\s*([^\|\n]+)/i);
  const dañoM    = text.match(/DA[NÑ]O:\s*([^\|\n]+)/i);

  const gName  = ganadorM ? ganadorM[1].trim() : '';
  const muerte = muerteM  ? muerteM[1].trim()  : 'Cayó derrotado en combate mortal.';
  const daño   = dañoM    ? dañoM[1].trim()    : 'Quedó con heridas menores del combate.';

  let winner1 = true;
  if (gName) {
    const g  = gName.toLowerCase();
    const a1 = n1.toLowerCase();
    const a2 = n2.toLowerCase();
    if (g.includes(a1) || a1.split(' ').filter(w => w.length > 2).every(w => g.includes(w))) {
      winner1 = true;
    } else if (g.includes(a2) || a2.split(' ').filter(w => w.length > 2).every(w => g.includes(w))) {
      winner1 = false;
    } else {
      const s1 = a1.split(' ').filter(w => w.length > 2 && g.includes(w)).length;
      const s2 = a2.split(' ').filter(w => w.length > 2 && g.includes(w)).length;
      winner1 = s1 >= s2;
    }
  }
  console.log(`[Parser] Ganador detectado: ${winner1 ? n1 : n2} (de "${gName}")`);
  return { winner1, muerte, daño };
}

function fallbackNarr(f1, f2, round) {
  const totalF1 = Object.values(f1.stats).reduce((a,b)=>a+b,0);
  const totalF2 = Object.values(f2.stats).reduce((a,b)=>a+b,0);
  // Weight toward higher-stat fighter but allow upsets
  const w = Math.random() < (totalF1 > totalF2 ? 0.65 : 0.35) ? f1 : f2;
  const l = w === f1 ? f2 : f1;
  return (
    `En la arena cósmica de Uatu, ${f1.name} y ${f2.name} se encontraron en ${round}. ` +
    `Sus energías chocaron con tal violencia que el tejido de la realidad misma tembló bajo sus pies.\n\n` +
    `${f1.name} lanzó el primer golpe con toda la fuerza de su universo detrás de él. ` +
    `${f2.name} respondió con igual ferocidad, su poder resonando como un trueno cósmico a través de la arena.\n\n` +
    `En el momento más crítico del enfrentamiento, ${w.name} encontró una apertura inesperada ` +
    `y ejecutó un ataque definitivo que selló el destino del combate sin dejar margen de duda.\n\n` +
    `GANADOR: ${w.name} | MUERTE: ${l.name} fue destruido por completo en el instante final. ` +
    `Su energía vital se dispersó en el vacío cósmico, incapaz de resistir el golpe definitivo. | ` +
    `DAÑO: ${w.name} quedó con profundas cicatrices visibles en su cuerpo, testimonio eterno de esta batalla.`
  );
}

function toggleSelect(idx) {
  const c = allChars[idx];
  const card = document.getElementById(`card-${idx}`);
  if (selectedIds.has(idx)) {
    selectedIds.delete(idx);
    card.classList.remove('selected');
  } else {
    const mv = isMarvel(c);
    const mC = [...selectedIds].filter(i => isMarvel(allChars[i])).length;
    const dC = [...selectedIds].filter(i => !isMarvel(allChars[i])).length;
    if (mv && mC >= 8) return;
    if (!mv && dC >= 8) return;
    selectedIds.add(idx);
    card.classList.add('selected');
  }
  updateCounter();
  updateUnavailable();
}

function updateCounter() {
  const mC = [...selectedIds].filter(i => isMarvel(allChars[i])).length;
  const dC = [...selectedIds].filter(i => !isMarvel(allChars[i])).length;
  document.getElementById('counter').innerHTML =
    `<span class="cnt-marvel">Marvel: ${mC}/8</span>&nbsp;|&nbsp;<span class="cnt-dc">DC: ${dC}/8</span>`;
  document.getElementById('btn-create').disabled = !(mC === 8 && dC === 8);
  setNavStatus(`Selecciona: Marvel ${mC}/8 | DC ${dC}/8`);
}

function updateUnavailable() {
  const mC = [...selectedIds].filter(i => isMarvel(allChars[i])).length;
  const dC = [...selectedIds].filter(i => !isMarvel(allChars[i])).length;
  allChars.forEach((c, i) => {
    const mv   = isMarvel(c);
    const full = mv ? (mC >= 8) : (dC >= 8);
    const card = document.getElementById(`card-${i}`);
    if (full && !selectedIds.has(i)) card.classList.add('unavailable');
    else card.classList.remove('unavailable');
  });
}

function randomSelection() {
  selectedIds.clear();
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected','unavailable'));
  const mI = allChars.map((c,i) =>  isMarvel(c) ? i : -1).filter(i => i >= 0);
  const dI = allChars.map((c,i) => !isMarvel(c) ? i : -1).filter(i => i >= 0);
  [...shuffle(mI).slice(0,8), ...shuffle(dI).slice(0,8)].forEach(i => {
    selectedIds.add(i);
    document.getElementById(`card-${i}`).classList.add('selected');

/* ── Resolución instantánea sin narración ni combate con Uatu ── */
function quickResolve() {
  for (let ri = 0; ri < 4; ri++) {
    rounds[ri].forEach(match => {
      const f1 = match.f1, f2 = match.f2;
      if (!f1 || !f2) return;
      const t1 = Object.values(f1.stats).reduce((a,b)=>a+b,0);
      const t2 = Object.values(f2.stats).reduce((a,b)=>a+b,0);
      const fav = t1 >= t2 ? f1 : f2;
      match.winner = Math.random() < 0.65 ? fav : (fav===f1 ? f2 : f1);
      match.loser  = match.winner === f1 ? f2 : f1;
      match.winner.stats = degradeStats(match.winner);
    });
    if (ri < 3) {
      for (let i = 0; i < rounds[ri+1].length; i++) {
        rounds[ri+1][i].f1 = rounds[ri][i*2].winner;
        rounds[ri+1][i].f2 = rounds[ri][i*2+1].winner;
      }
    }
  }

  champion = rounds[3][0].winner;
  renderBracket();

  const col = charColor(champion);
  document.getElementById('bracket-actions').innerHTML = `
    <div style="text-align:center;padding:1.2rem 0">
      <div style="font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:0.2em;margin-bottom:0.8rem;text-transform:uppercase">
        Campeón del Torneo
      </div>
      <div style="display:inline-flex;align-items:center;gap:1rem;background:rgba(0,0,0,0.4);border:1px solid ${col};border-radius:8px;padding:0.8rem 1.4rem;margin-bottom:1rem">
        ${imgTag(champion.image,'char-img',champion.name,col,'width:80px;height:104px;object-fit:cover;object-position:top;display:block;border-radius:4px')}
        <div style="text-align:left">
          <div style="font-family:'Cinzel',serif;font-size:1.2rem;font-weight:900;color:${col};text-transform:uppercase">${champion.name}</div>
          <div style="font-size:0.75rem;color:var(--dim);margin-top:0.2rem">${champion.publisher}</div>
        </div>
      </div><br>
      <button class="btn btn-gold" onclick="location.reload()">↺ Nuevo Torneo</button>
    </div>`;
  setNavStatus(`Campeón: ${champion.name}`);
}

/* ── NARRATION ── */
async function startNarration() {
  const { f1, f2 } = getMatch();
  const src1 = f1.image || '';
  const src2 = f2.image || '';
  setNavStatus('⚡ Generando narración...');

  document.getElementById('combat-content').innerHTML = `
    <div class="narr-bg">
      <div class="narr-bg-half" style="background-image:url('${src1}')"></div>
      <div class="narr-bg-half" style="background-image:url('${src2}')"></div>
    </div>
    <div class="narr-screen">
      <div class="narr-inner">
        <div class="narr-loading"><p>⚡ Generando narración épica...</p></div>
      </div>
    </div>`;

  let narration, winnerName, loserFate, winnerDamage;
  try {
    const data = await callNarrate({
      fighter1: { name: f1.name, publisher: f1.publisher, stats: f1.stats, damage: f1.damage || '' },
      fighter2: { name: f2.name, publisher: f2.publisher, stats: f2.stats, damage: f2.damage || '' },
      round: getRoundName()
    });
    ({ narration, winnerName, loserFate, winnerDamage } = data);
  } catch(e) {
    console.error('[Narrate API] Error:', e.message);
    const text   = fallbackNarr(f1, f2, getRoundName());
    const parsed = parseCombat(text, f1.name, f2.name);
    winnerName   = parsed.winner1 ? f1.name : f2.name;
    loserFate    = parsed.muerte;
    winnerDamage = parsed.daño;
    narration    = text.replace(/GANADOR:.*$/is, '').trim();
  }

  const { winner1 } = parseCombat(`GANADOR: ${winnerName || f1.name}`, f1.name, f2.name);
  curWinner = winner1 ? f1 : f2;
  curLoser  = winner1 ? f2 : f1;
  curDeath  = loserFate;
  curDamage = winnerDamage;

  const match    = getMatch();
  match.winner   = curWinner;
  match.loser    = curLoser;
  curWinner.stats  = degradeStats(curWinner);
  curWinner.damage = winnerDamage;

  const paras = narration.split(/\n+/).filter(p => p.trim()).map(p => `<p>${p.trim()}</p>`).join('');

  setNavStatus(`${getRoundName()} · ${curMatch+1}/${rounds[curRound].length} — Narración`);
  document.getElementById('combat-content').innerHTML = `
    <div class="narr-bg">
      <div class="narr-bg-half" style="background-image:url('${src1}')"></div>
      <div class="narr-bg-half" style="background-image:url('${src2}')"></div>
    </div>
    <div class="narr-screen">
      <div class="narr-inner">
        <div class="narr-title">⚔ ${f1.name} vs ${f2.name}</div>
        <div class="narr-text">${paras}</div>
        <div class="comb-btn">
          <button class="btn btn-gold" onclick="showResult()">Ver Resultado ▶</button>
        </div>
      </div>
    </div>`;
}

                                  display:flex;align-items:center;justify-content:center;margin:0 auto">
         <div style="color:#666;font-family:'Cinzel',serif;font-size:0.75rem;text-align:center;padding:1rem;
                     text-transform:uppercase;text-decoration:line-through">${curLoser.name}</div>
       </div>`;

  setNavStatus(`✓ ${curWinner.name} venció a ${curLoser.name}`);
  document.getElementById('combat-content').innerHTML = `
    <div class="result-wrap">
      <div class="result-title">⚔ RESULTADO</div>
      <div class="result-duo">
        <div class="r-winner-panel">
          ${winImg}
          <div class="r-winner-name">🏆 ${curWinner.name}</div>
          <div class="mt1">${bigStatBars(curWinner.stats)}</div>
        </div>
        <div class="r-loser-panel">
          ${losImg}
          <div class="r-loser-name">${curLoser.name}</div>
        </div>
      </div>
      <div class="death-box">💀 ${curDeath}</div>
      <div class="damage-box">
        <h4>ESTADO DEL GANADOR</h4>
        <p>${curDamage}</p>
      </div>
      <div class="comb-btn">
        <button class="btn btn-gold" onclick="${btnAction}">${btnLabel}</button>
      </div>
    </div>`;

  // Feed winners into next round when last match of this round is done
  if (isLastInRound() && curRound < 3) {
    const nr = curRound + 1;
    for (let i = 0; i < rounds[nr].length; i++) {
      rounds[nr][i].f1 = rounds[curRound][i * 2].winner;
      rounds[nr][i].f2 = rounds[curRound][i * 2 + 1].winner;
    }
  }
}

function nextMatch() {
  curMatch++;
  renderPresentation();
}

function advanceRound() {
  curRound++;
  curMatch = 0;
  renderBracket();
  document.getElementById('bracket-actions').innerHTML =
    `<button class="btn btn-gold" onclick="continueCombats()">Continuar — ${ROUND_NAMES[curRound]}</button>`;
  showScreen('screen-bracket');
  setNavStatus(`${ROUND_NAMES[curRound]} — ${rounds[curRound].length} combates`);
}

function continueCombats() {
  showScreen('screen-combat');
  renderPresentation();
}

/* ═══════════════════════════════════════════
   FINAL vs UATU
═══════════════════════════════════════════ */
function launchFinal() {
  champion = curWinner;
  showScreen('screen-final');
  setNavStatus('⚡ Prueba Final — Uatu el Observador');
  AudioManager.crossfade('battle');

  const mv  = isMarvel(champion);
  const col = charColor(champion);

  const uatuBlock = `
    <div style="width:180px;height:240px;
      background:radial-gradient(circle,#2a1900,#0a0800);
      border:2px solid var(--gold);
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;margin:0 auto;gap:0.5rem">
      <div style="font-size:4rem;line-height:1">👁</div>
      <div style="font-family:'Cinzel',serif;color:var(--gold);font-size:0.75rem;letter-spacing:0.15em">EL OBSERVADOR</div>
    </div>`;

  const champImg = imgTag(
    champion.image,
    'char-img',
    champion.name,
    col,
    `width:180px;height:240px;object-fit:cover;object-position:top;display:block;
     margin:0 auto;filter:drop-shadow(0 0 12px ${col})`
  );

  document.getElementById('final-content').innerHTML = `
    <div class="final-wrap">
      <h2 class="final-title">⚡ EL OBSERVADOR CONVOCA AL CAMPEÓN ⚡</h2>
      <div style="display:flex;gap:2rem;justify-content:center;align-items:flex-start;flex-wrap:wrap;margin:1.5rem 0">
        <div class="uatu-card">
          ${uatuBlock}
          <div class="f-name" style="color:var(--gold);margin-top:0.75rem;font-size:1.1rem">UATU EL OBSERVADOR</div>
          <div style="color:var(--gold);font-size:0.7rem;margin:0.3rem 0 0.5rem;letter-spacing:0.1em">ENTIDAD CÓSMICA</div>
          ${bigStatBars(UATU.stats)}
        </div>
        <div style="font-family:'Cinzel',serif;font-size:2rem;color:var(--gold);padding-top:80px">VS</div>
        <div class="uatu-card" style="border-color:${col}">
          ${champImg}
          <div class="f-name" style="color:${col};margin-top:0.75rem;font-size:1.1rem">${champion.name}</div>
          <div style="color:${col};font-size:0.7rem;margin:0.3rem 0 0.5rem;letter-spacing:0.1em">${champion.publisher.toUpperCase()}</div>
          ${champion.damage ? `<div class="f-dmg">⚠ ${champion.damage}</div>` : ''}
          ${bigStatBars(champion.stats)}
        </div>
      </div>
      <div class="tc mt2">
        <button class="btn btn-gold" onclick="runFinalBattle()">⚡ Iniciar Prueba Final</button>
      </div>
    </div>`;
}

async function runFinalBattle() {
  setNavStatus('⚡ Generando prueba cósmica final...');
  document.getElementById('final-content').innerHTML = `
    <div class="final-wrap" style="padding-top:5rem">
      <div class="narr-loading"><p>⚡ Generando la prueba cósmica final...</p></div>
    </div>`;

  let narration;
  try {
    const data = await callNarrate({
      fighter1:   { name: 'Uatu el Observador', publisher: 'Marvel Comics', stats: UATU.stats, damage: '' },
      fighter2:   { name: champion.name, publisher: champion.publisher, stats: champion.stats, damage: champion.damage || '' },
      isUatuFight: true
    });
    narration = data.narration;
  } catch(e) {
    console.error('[Narrate API] Error en batalla final:', e.message);
    narration =
      `En la arena cósmica, ${champion.name} se enfrentó a la prueba definitiva de Uatu el Observador. ` +
      `Los poderes del ser eterno sacudieron la realidad misma mientras cada golpe dejaba grietas en el tejido del espacio-tiempo.\n\n` +
      `${champion.name} absorbió fuerzas que habrían destruido planetas enteros, canalizando cada herida acumulada ` +
      `en determinación pura e inquebrantable. El universo observó contener la respiración mientras este ser ` +
      `extraordinario desafiaba lo que ningún mortal había osado enfrentar.\n\n` +
      `En el momento más oscuro, ${champion.name} encontró reservas de poder desconocidas y ejecutó un ` +
      `contraataque que hizo retroceder al propio Uatu por primera vez en eones de existencia.\n\n` +
      `El Observador bajó los brazos. Su forma cósmica se distendió. La prueba había concluido.`;
  }

  const paras = narration.split(/\n+/).filter(p => p.trim()).map(p => `<p>${p.trim()}</p>`).join('');

  champion.stats  = degradeStats(champion);
  champion.damage = 'Cicatrices cósmicas de la prueba de Uatu';

  showEpilogue(paras);
}

function showEpilogue(narration) {
  const mv  = isMarvel(champion);
  const col = charColor(champion);
  setNavStatus(`🏆 Campeón: ${champion.name}`);

  const champBigImg = champion.image
    ? `<img src="${champion.image}" alt="${champion.name}" referrerpolicy="no-referrer"
            data-n="${champion.name.replace(/"/g,"'")}" data-c="${col}"
            style="width:230px;height:300px;object-fit:cover;object-position:top;display:block;margin:0 auto;
                   filter:drop-shadow(0 0 28px ${col}) drop-shadow(0 0 56px ${col}60);background:#1a1a1a"
            onerror="imgErr(this)">`
    : `<div style="width:230px;height:300px;background:#111;border:2px solid ${col};
                   display:flex;align-items:center;justify-content:center;flex-direction:column;
                   margin:0 auto;box-shadow:0 0 28px ${col},0 0 56px ${col}60">
         <div style="font-size:3rem;margin-bottom:0.5rem">${mv ? '⚡' : '🌟'}</div>
         <div style="color:${col};font-family:'Cinzel',serif;font-size:1rem;font-weight:700;
                     text-align:center;padding:1rem;text-transform:uppercase">${champion.name}</div>
       </div>`;

  document.getElementById('final-content').innerHTML = `
    <div class="final-wrap">
      <h2 class="final-title">🏆 CAMPEÓN DEL MULTIVERSO 🏆</h2>

      <div class="tc" style="margin:2rem 0">
        ${champBigImg}
        <div style="font-family:'Cinzel',serif;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;
                    color:${col};margin:1rem 0 0.25rem;text-transform:uppercase;letter-spacing:0.12em">
          ${champion.name}
        </div>
        <div style="color:var(--gold);font-size:0.85rem;letter-spacing:0.2em;margin-bottom:0.75rem">
          ${champion.publisher.toUpperCase()}
        </div>
        <div style="max-width:400px;margin:0 auto">${bigStatBars(champion.stats)}</div>
        <div class="f-dmg" style="max-width:420px;margin:0.75rem auto 0">⚡ ${champion.damage}</div>
      </div>

      <div class="epilogue-box">
        <h3>⚡ LA PRUEBA DE UATU</h3>
        <div class="narr-text">${narration}</div>
      </div>

      <div class="epilogue-box">
        <h3>📜 EPÍLOGO — LA VERDAD DEL OBSERVADOR</h3>
        <p>Uatu el Observador dejó caer sus manos y su forma cósmica se tornó menos amenazante.
           Su voz resonó como el eco del Big Bang a través de cada rincón de la arena.</p>
        <p>"He contemplado la caída de civilizaciones milenarias, el nacimiento y muerte de estrellas,
           el llanto de dioses olvidados. Pero nunca, en mis eones de existencia eterna,
           había presenciado tal resolución. Tal voluntad que se niega a quebrarse."</p>
        <p>"La verdad que he ocultado hasta este momento: dos universos paralelos —el tuyo,
           <strong style="color:${col}">${champion.name}</strong>, y otro— están en curso de colisión inevitable.
           Una colisión que borrará a ambos de la existencia. Los Celestiales han fallado.
           Los Preceptores Cósmicos han abandonado toda esperanza.
           Solo un ser portador del alma de ambos universos puede sellar la brecha."</p>
        <p>"Ese ser eres tú. El torneo no fue entretenimiento. Fue una forja.
           Cada combate te endureció. Cada herida te enseñó. Cada victoria expandió tus límites
           más allá de lo que cualquier entrenamiento habría podido lograr."</p>
        <p>"El multiverso te llama, campeón. ¿Aceptas cargar con el peso de dos universos?"</p>
        <p style="font-style:normal;text-align:center;font-family:'Cinzel',serif;
                  color:var(--gold);font-size:1.1rem;margin-top:1.5rem;letter-spacing:0.08em;
                  border-top:1px solid rgba(243,156,18,0.3);padding-top:1.25rem">
          Y así comenzó la verdadera batalla.<br>
          La que nadie vería. La que salvaría todo lo que existe.<br>
          <span style="font-size:0.85rem;color:var(--dim)">— FIN —</span>
        </p>
      </div>

      <div class="tc" style="margin:2.5rem 0">
        <button class="btn btn-gold" onclick="location.reload()">↺ Nuevo Torneo</button>
      </div>
    </div>`;
}
</script>
</body>
</html>
